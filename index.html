    const Typewriter = ({ words }) => {
      const [text, setText] = useState('');
      const [wordIndex, setWordIndex] = useState(0);
      const [isDeleting, setIsDeleting] = useState(false);

      useEffect(() => {
        const word = words[wordIndex];
        let typingDelay = isDeleting ? 40 : 120; // Type speed vs delete speed

        if (!isDeleting && text === word) {
          typingDelay = 2000; // Pause at end of word
          const waitTimeout = setTimeout(() => setIsDeleting(true), typingDelay);
          return () => clearTimeout(waitTimeout);
        } else if (isDeleting && text === '') {
          setIsDeleting(false);
          setWordIndex((prev) => (prev + 1) % words.length);
          typingDelay = 400; // Pause before new word
        }

        const timeout = setTimeout(() => {
          setText(prev => isDeleting ? prev.slice(0, -1) : word.slice(0, prev.length + 1));
        }, typingDelay);

        return () => clearTimeout(timeout);
      }, [text, isDeleting, wordIndex, words]);

      return (
        <span>
          {text}
          <span className="ml-[2px] animate-pulse border-r-[3px] border-primary h-[80%] inline-block align-middle pb-1"></span>
        </span>

  <!-- Canvas AI Particle Engine -->
  <script>
    const canvas = document.getElementById('particle-canvas');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let particlesArray = [];

      class Particle {
        constructor(x, y, dx, dy, size) {
          this.x = x; this.y = y;
          this.dx = dx; this.dy = dy;
          this.size = size;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
          ctx.fillStyle = 'rgba(156, 163, 175, 0.4)'; // Muted gray floating stars
          ctx.shadowBlur = 10;
          ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
          ctx.fill();
        }
        update() {
          if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
          if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
          this.x += this.dx;
          this.y += this.dy;
          this.draw();
        }
      }

      function init() {
        particlesArray = [];
        let numberOfParticles = (canvas.height * canvas.width) / 9000;
        for (let i = 0; i < numberOfParticles; i++) {
          let size = (Math.random() * 2) + 0.5;
          let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
          let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
          let dx = (Math.random() * 0.5) - 0.25;
          let dy = (Math.random() * 0.5) - 0.25;
          particlesArray.push(new Particle(x, y, dx, dy, size));
        }
      }

      function animate() {
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, innerWidth, innerHeight);
        for (let i = 0; i < particlesArray.length; i++) {
          particlesArray[i].update();
        }
      }

      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        init();
      });

      init();
      animate();
    }
  </script>
